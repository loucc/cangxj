# Docker profile：所有连接信息通过环境变量注入，便于 K8s / Compose 部署
spring:
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://postgres:5432/cxj?currentSchema=public&stringtype=unspecified}
    username: ${DATASOURCE_USERNAME:postgres}
    password: ${DATASOURCE_PASSWORD:postgres}
    hikari:
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: ${REDIS_TIMEOUT:5000ms}

app:
  security:
    jwt:
      secret: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION:7200}
      issuer: ${JWT_ISSUER:cxj}
    max-sessions-per-user: ${MAX_SESSIONS:3}
    refresh-token-ttl: ${REFRESH_TOKEN_TTL:604800}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

logging:
  level:
    root: INFO
    com.cxj: ${LOG_LEVEL_APP:INFO}
    com.cxj.mapper: ${LOG_LEVEL_MAPPER:INFO}
  file:
    name: /app/logs/cxj.log

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
